<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청곡 수신 — 강사용</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title-wrap h1 { font-size: 20px; font-weight: 700; }
    .title-wrap p { font-size: 12px; color: #555; margin-top: 4px; }

    .badge {
      background: #6c63ff;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
      margin-bottom: 20px;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
    .dot.connected { background: #4ade80; }

    .notif-btn {
      display: block;
      margin-bottom: 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #888;
      font-size: 12px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .notif-btn:hover { background: #222; }
    .notif-btn.granted { color: #4ade80; border-color: #4ade80; cursor: default; }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #666;
      transition: all 0.15s;
    }

    .tab.active { background: #6c63ff; border-color: #6c63ff; color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: #333;
      font-size: 14px;
    }

    /* 최신순 목록 */
    .list { display: flex; flex-direction: column; gap: 10px; }

    .item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    .item.new { border-color: #6c63ff; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-artist { font-size: 12px; color: #666; margin-top: 2px; }

    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .item-time { font-size: 11px; color: #444; }
    .item-likes { font-size: 12px; color: #6c63ff; font-weight: 700; }

    /* 랭킹 탭 */
    .rank-list { display: flex; flex-direction: column; gap: 8px; }

    .rank-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .rank-num { font-size: 13px; font-weight: 700; color: #444; width: 20px; text-align: center; flex-shrink: 0; }
    .rank-num.top { color: #6c63ff; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-artist { font-size: 12px; color: #666; margin-top: 2px; }
    .rank-likes { font-size: 13px; color: #6c63ff; font-weight: 700; flex-shrink: 0; }
  </style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <h1>🎵 신청곡 수신</h1>
      <p>강사용 — 실시간 수신 대시보드</p>
    </div>
    <div class="badge" id="count">0곡</div>
  </header>

  <button class="notif-btn" id="notifBtn">🔔 브라우저 알림 켜기</button>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">연결 중...</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="latest">최신순</button>
    <button class="tab" data-tab="ranking">좋아요 랭킹</button>
  </div>

  <div class="panel active" id="panel-latest">
    <div class="empty" id="emptyLatest">아직 신청곡이 없어요</div>
    <div class="list" id="list"></div>
  </div>

  <div class="panel" id="panel-ranking">
    <div class="empty" id="emptyRanking">아직 신청곡이 없어요</div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <audio id="beep" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbxpY3IjFjl9XkxJg0IzFll9XexJg2IzFkl9PcxJg0IzFkl9PcxJkzIzFkl9PcxJgzIjFkl9PcxJgzIjFkl9PcxJgzIjFkl9TcxJgzIjFkl9TcxJgzIjFkl9TcxJgzIjFkl9TcxJgzIjFkl9TcxJgzIjFkl9TcxJgzIjFkl9TcxJg=" preload="auto"></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const list = document.getElementById('list');
    const rankList = document.getElementById('rankList');
    const emptyLatest = document.getElementById('emptyLatest');
    const emptyRanking = document.getElementById('emptyRanking');
    const countBadge = document.getElementById('count');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const notifBtn = document.getElementById('notifBtn');
    const beep = document.getElementById('beep');

    let allRequests = [];

    // 탭 전환
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
        if (tab.dataset.tab === 'ranking') renderRanking();
      });
    });

    socket.on('connect', () => {
      dot.classList.add('connected');
      statusText.textContent = '실시간 연결됨';
    });

    socket.on('disconnect', () => {
      dot.classList.remove('connected');
      statusText.textContent = '연결 끊김 — 재연결 중...';
    });

    socket.on('new-request', (entry) => {
      allRequests.unshift(entry);
      addLatestItem(entry, true);
      countBadge.textContent = `${allRequests.length}곡`;
      playBeep();
      showNotification(entry);
    });

    socket.on('like-update', ({ id, likes }) => {
      const entry = allRequests.find(r => r.id === id);
      if (entry) {
        entry.likes = likes;
        const likesEl = list.querySelector(`[data-id="${id}"] .item-likes`);
        if (likesEl) likesEl.textContent = `💜 ${likes}`;
        renderRanking();
      }
    });

    function addLatestItem(entry, isNew = false) {
      emptyLatest.style.display = 'none';
      const div = document.createElement('div');
      div.className = isNew ? 'item new' : 'item';
      div.dataset.id = entry.id;
      div.innerHTML = `
        <div class="item-info">
          <div class="item-title">${esc(entry.title)}</div>
          <div class="item-artist">${esc(entry.artist)}</div>
        </div>
        <div class="item-right">
          <div class="item-time">${entry.time}</div>
          <div class="item-likes">💜 ${entry.likes}</div>
        </div>
      `;
      list.prepend(div);
      if (isNew) setTimeout(() => div.classList.remove('new'), 2000);
    }

    function renderRanking() {
      const sorted = [...allRequests].sort((a, b) => b.likes - a.likes);
      rankList.innerHTML = '';
      emptyRanking.style.display = sorted.length ? 'none' : 'block';

      sorted.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'rank-item';
        div.innerHTML = `
          <div class="rank-num ${idx < 3 ? 'top' : ''}">${idx + 1}</div>
          <div class="rank-info">
            <div class="rank-title">${esc(entry.title)}</div>
            <div class="rank-artist">${esc(entry.artist)}</div>
          </div>
          <div class="rank-likes">💜 ${entry.likes}</div>
        `;
        rankList.appendChild(div);
      });
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function playBeep() {
      try { beep.currentTime = 0; beep.play(); } catch {}
    }

    function showNotification(entry) {
      if (Notification.permission === 'granted') {
        new Notification('🎵 새 신청곡', { body: `${entry.title} — ${entry.artist}` });
      }
    }

    notifBtn.addEventListener('click', async () => {
      if (Notification.permission === 'granted') return;
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notifBtn.textContent = '✅ 브라우저 알림 켜짐';
        notifBtn.classList.add('granted');
        notifBtn.disabled = true;
      }
    });

    if (Notification.permission === 'granted') {
      notifBtn.textContent = '✅ 브라우저 알림 켜짐';
      notifBtn.classList.add('granted');
      notifBtn.disabled = true;
    }

    fetch('/api/requests')
      .then(r => r.json())
      .then(data => {
        allRequests = [...data].reverse();
        countBadge.textContent = `${allRequests.length}곡`;
        if (allRequests.length) {
          emptyLatest.style.display = 'none';
          [...data].forEach(entry => addLatestItem(entry, false));
        }
      });
  </script>
</body>
</html>
