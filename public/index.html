<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청곡 남기기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
    }

    .emoji { font-size: 36px; margin-bottom: 12px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input::placeholder { color: #444; }
    input:focus { border-color: #6c63ff; }

    button {
      width: 100%;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #5a52e0; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #333; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }

    .success .check { font-size: 48px; margin-bottom: 12px; }
    .success p { color: #aaa; font-size: 15px; line-height: 1.6; }
    .success strong { color: #fff; }

    .again {
      display: none;
      margin-top: 20px;
      width: 100%;
      background: #222;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .again:hover { background: #2a2a2a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎵</div>
    <h1>신청곡 남기기</h1>
    <p class="sub">익명으로 전달돼요. 편하게 남겨주세요!</p>

    <form id="form">
      <label>곡 제목</label>
      <input id="title" type="text" placeholder="예: Dynamite" autocomplete="off" />

      <label>가수 / 아티스트</label>
      <input id="artist" type="text" placeholder="예: BTS" autocomplete="off" />

      <button type="submit" id="btn">신청하기</button>
    </form>

    <div class="success" id="success">
      <div class="check">✅</div>
      <p><strong id="submitted"></strong><br/>신청이 전달됐어요!</p>
      <button class="again" id="again">한 곡 더 신청하기</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const submitted = document.getElementById('submitted');
    const again = document.getElementById('again');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const artist = document.getElementById('artist').value.trim();

      if (!title || !artist) {
        alert('제목과 가수명을 모두 입력해주세요.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '전송 중...';

      try {
        const res = await fetch('/api/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, artist }),
        });

        if (res.ok) {
          submitted.textContent = `"${title}" — ${artist}`;
          form.style.display = 'none';
          success.style.display = 'block';
          again.style.display = 'block';
        } else {
          alert('오류가 발생했어요. 다시 시도해주세요.');
          btn.disabled = false;
          btn.textContent = '신청하기';
        }
      } catch {
        alert('서버에 연결할 수 없어요. 잠시 후 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '신청하기';
      }
    });

    again.addEventListener('click', () => {
      document.getElementById('title').value = '';
      document.getElementById('artist').value = '';
      form.style.display = 'block';
      success.style.display = 'none';
      again.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '신청하기';
    });
  </script>
</body>
</html>
