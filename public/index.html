<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청곡 남기기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
      padding: 32px 24px 60px;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }

    /* 신청 폼 카드 */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 28px;
      margin-bottom: 12px;
    }

    .emoji { font-size: 32px; margin-bottom: 10px; }
    h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #555; margin-bottom: 20px; }

    /* 금지 장르 공지 */
    .notice {
      background: #1f1510;
      border: 1px solid #4a2e10;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 24px;
    }

    .notice-title {
      font-size: 12px;
      font-weight: 700;
      color: #f97316;
      margin-bottom: 6px;
    }

    .notice ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .notice li {
      font-size: 12px;
      background: #2a1a08;
      color: #fb923c;
      border: 1px solid #7c3a10;
      border-radius: 999px;
      padding: 3px 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input::placeholder { color: #3a3a3a; }
    input:focus { border-color: #6c63ff; }

    button[type="submit"] {
      width: 100%;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #5a52e0; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .success { display: none; text-align: center; padding: 16px 0 4px; }
    .success .check { font-size: 40px; margin-bottom: 10px; }
    .success p { color: #888; font-size: 14px; line-height: 1.6; }
    .success strong { color: #fff; }

    .again {
      margin-top: 16px;
      width: 100%;
      background: #222;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .again:hover { background: #2a2a2a; }

    /* 랭킹 */
    .ranking-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 28px 0 14px;
    }

    .ranking-header h2 { font-size: 16px; font-weight: 700; }
    .ranking-count { font-size: 13px; color: #555; }

    .empty-rank {
      text-align: center;
      padding: 40px 0;
      color: #333;
      font-size: 14px;
    }

    .rank-list { display: flex; flex-direction: column; gap: 8px; }

    .rank-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rank-num {
      font-size: 13px;
      font-weight: 700;
      color: #444;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-num.top { color: #6c63ff; }

    .rank-info { flex: 1; min-width: 0; }

    .rank-title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-artist { font-size: 12px; color: #666; margin-top: 2px; }

    .like-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .like-btn:hover { border-color: #6c63ff; }
    .like-btn.liked { border-color: #6c63ff; background: #1a1730; }

    .like-icon { font-size: 16px; line-height: 1; }
    .like-count { font-size: 11px; color: #666; font-weight: 700; }
    .like-btn.liked .like-count { color: #6c63ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="emoji">🎵</div>
      <h1>신청곡 남기기</h1>
      <p class="sub">익명으로 전달돼요. 편하게 남겨주세요!</p>

      <div class="notice">
        <div class="notice-title">🚫 신청 불가 장르</div>
        <ul>
          <li>한국어 가사</li>
          <li>힙합</li>
          <li>락 / Rock</li>
          <li>댄스곡</li>
        </ul>
      </div>

      <form id="form">
        <label>곡 제목</label>
        <input id="title" type="text" placeholder="예: Dynamite" autocomplete="off" />
        <label>가수 / 아티스트</label>
        <input id="artist" type="text" placeholder="예: BTS" autocomplete="off" />
        <button type="submit" id="btn">신청하기</button>
      </form>

      <div class="success" id="success">
        <div class="check">✅</div>
        <p><strong id="submitted"></strong><br/>신청이 전달됐어요!</p>
        <button class="again" id="again">한 곡 더 신청하기</button>
      </div>
    </div>

    <!-- 랭킹 -->
    <div class="ranking-header">
      <h2>🏆 신청곡 랭킹</h2>
      <span class="ranking-count" id="rankCount">0곡</span>
    </div>
    <div class="empty-rank" id="emptyRank">아직 신청곡이 없어요</div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const submitted = document.getElementById('submitted');
    const again = document.getElementById('again');
    const rankList = document.getElementById('rankList');
    const emptyRank = document.getElementById('emptyRank');
    const rankCount = document.getElementById('rankCount');

    // localStorage로 좋아요 상태 관리
    function getLiked() {
      try { return JSON.parse(localStorage.getItem('liked') || '[]'); } catch { return []; }
    }
    function setLiked(ids) {
      localStorage.setItem('liked', JSON.stringify(ids));
    }
    function isLiked(id) { return getLiked().includes(id); }
    function toggleLikedLocal(id) {
      const arr = getLiked();
      const idx = arr.indexOf(id);
      if (idx === -1) arr.push(id);
      else arr.splice(idx, 1);
      setLiked(arr);
    }

    let allRequests = [];

    function renderRanking() {
      const sorted = [...allRequests].sort((a, b) => b.likes - a.likes);
      rankList.innerHTML = '';
      emptyRank.style.display = sorted.length ? 'none' : 'block';
      rankCount.textContent = `${sorted.length}곡`;

      sorted.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'rank-item';
        div.dataset.id = entry.id;
        const liked = isLiked(entry.id);
        div.innerHTML = `
          <div class="rank-num ${idx < 3 ? 'top' : ''}">${idx + 1}</div>
          <div class="rank-info">
            <div class="rank-title">${esc(entry.title)}</div>
            <div class="rank-artist">${esc(entry.artist)}</div>
          </div>
          <button class="like-btn ${liked ? 'liked' : ''}" data-id="${entry.id}">
            <span class="like-icon">${liked ? '💜' : '🤍'}</span>
            <span class="like-count">${entry.likes}</span>
          </button>
        `;
        rankList.appendChild(div);
      });
    }

    rankList.addEventListener('click', async (e) => {
      const btn = e.target.closest('.like-btn');
      if (!btn) return;
      const id = parseInt(btn.dataset.id);

      try {
        const res = await fetch(`/api/like/${id}`, { method: 'POST' });
        if (res.ok) {
          const { likes, liked } = await res.json();
          const entry = allRequests.find(r => r.id === id);
          if (entry) entry.likes = likes;
          toggleLikedLocal(id);
          renderRanking();
        }
      } catch {}
    });

    socket.on('new-request', (entry) => {
      allRequests.push(entry);
      renderRanking();
    });

    socket.on('like-update', ({ id, likes }) => {
      const entry = allRequests.find(r => r.id === id);
      if (entry) { entry.likes = likes; renderRanking(); }
    });

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const artist = document.getElementById('artist').value.trim();
      if (!title || !artist) { alert('제목과 가수명을 모두 입력해주세요.'); return; }

      btn.disabled = true;
      btn.textContent = '전송 중...';

      try {
        const res = await fetch('/api/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, artist }),
        });
        const data = await res.json();

        if (res.ok) {
          submitted.textContent = `"${title}" — ${artist}`;
          form.style.display = 'none';
          success.style.display = 'block';
        } else {
          alert(data.error || '오류가 발생했어요.');
          btn.disabled = false;
          btn.textContent = '신청하기';
        }
      } catch {
        alert('서버에 연결할 수 없어요.');
        btn.disabled = false;
        btn.textContent = '신청하기';
      }
    });

    again.addEventListener('click', () => {
      document.getElementById('title').value = '';
      document.getElementById('artist').value = '';
      form.style.display = 'block';
      success.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '신청하기';
    });

    // 기존 신청곡 불러오기
    fetch('/api/requests')
      .then(r => r.json())
      .then(data => { allRequests = data; renderRanking(); });
  </script>
</body>
</html>
